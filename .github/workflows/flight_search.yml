name: Holiday Flight Search

on:
  schedule:
    # 10:30 Dublin time (UTC+1 in April/May = 09:30 UTC)
    - cron: '30 9 * * *'
    # 22:30 Dublin time (UTC+1 in April/May = 21:30 UTC)
    - cron: '30 21 * * *'
  workflow_dispatch:   # allows manual trigger from GitHub UI for testing

jobs:
  search-flights:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install browser system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 libnspr4 libdrm2 libgbm1 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libxkbcommon0 libx11-xcb1 libxcb-dri3-0 \
            libpango-1.0-0 libcairo2 \
            libasound2t64 libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Run flight search
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python flight_search.py

      - name: Upload debug screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/*.png
          retention-days: 3
